#
# Reusable workflow which publishes SNAPSHOT artifacts to Maven Central Portal Snapshots repository.
#
# Intended to be called on a daily basis.
#
# Permissions required:
# - contents: read
#
#
# NOTE
#
# The publishing is finalized only if the following conditions are met:
# - project version has `SNAPSHOT` qualifier
# - last published commit is different from current one
#
name: Nightly Build

on:
  workflow_call

jobs:
  initialize:
    name: Prepare workflow
    runs-on: ubuntu-latest
    outputs:
      last_built_sha: ${{ steps.last-built-commit.outputs.sha }}
    steps:
      - name: Resolve last nightly-built commit
        id: last-built-commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Return sha!
          readonly last_built_sha=$(gh api repos/${{ github.repository }}/actions/workflows/build-nightly.yml/runs --method GET -F status=completed -F per_page=1 --jq '.workflow_runs[0].head_sha')
          echo "sha=$last_built_sha" >> $GITHUB_OUTPUT

          echo "Last built commit: $last_built_sha" >&2

  publish:
    name: Publish snapshot
    needs: initialize
    if: github.sha != needs.initialize.outputs.last_built_sha
    runs-on: ubuntu-latest

    #
    # NOTE
    #
    # The build is based on two JDKs:
    #   - Tool JDK: from `.tool-versions` file
    #   - Target JDK: from Maven POM
    # Those JDKs are applied to three levels:
    #   1. Maven execution: Tool JDK
    #   2. Java compiler: Tool JDK (`build.jdk` system property is expected to be set the same as in
    #      `.tool-versions` file)
    #   3. Java source code: Target JDK
    #
    # |----------------------------------------------------------------------------------------------|
    # |                       |           JDK             |                       |                  |
    # |         Level         |---------------------------|    System property    |  MANIFEST entry  |
    # |                       |  Tool JDK  |  Target JDK  |                       |                  |
    # |----------------------------------------------------------------------------------------------|
    # |  1. Maven execution   |      X     |              |  (none: default JDK)  |  Tool-Jdk-Spec   |
    # |----------------------------------------------------------------------------------------------|
    # |  2. Java compiler     |      X     |              |  (none: default JDK)  |  Build-Jdk-Spec  |
    # |----------------------------------------------------------------------------------------------|
    # |  3. Java source code  |            |       X      |  target.jdk           |  Java-Version    |
    # |----------------------------------------------------------------------------------------------|
    #

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: ./.github/actions/setup-java-publish
        with:
          gpg_signing_key: ${{ secrets.GPG_SIGNING_KEY }}

      - name: Publish with Maven
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSPHRASE }}
        run: |
          readonly project_version=$(./mvnw help:evaluate -Dexpression=project.version -DforceStdout -q)
          if [[ $project_version = *-SNAPSHOT ]]; then
            echo "Project version: $project_version" >&2

            echo "TARGET_JDK: $TARGET_JDK" >&2
            echo "TARGET_JDK_HOME: $TARGET_JDK_HOME" >&2

            # NOTE:
            # - no need to set `target.jdk` property, as project's default corresponds to Target JDK
            # - no need to set `build.jdk` property, as project's default corresponds to Tool JDK
            ./mvnw deploy -Ppublish \
                -Dtarget.jdk.home="$TARGET_JDK_HOME" \
                --batch-mode --errors
          else
            echo "NOP: Project version $project_version NOT APPLICABLE for nightly build (SNAPSHOT required)" >&2
          fi
